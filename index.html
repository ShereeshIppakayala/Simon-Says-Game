<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #071a3d, #1d4ed8, #8b5cf6);
            color: #fff;
        }

        .game-shell {
            width: min(92vw, 560px);
            padding: 28px 24px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.16);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 3vw, 2.7rem);
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
        }

        h2 {
            margin: 0 0 24px;
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 500;
            color: #f8fafc;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, minmax(120px, 200px));
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        .box {
            position: relative;
            aspect-ratio: 1;
            border-radius: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 14px;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .box:hover {
            transform: translateY(-4px) scale(1.02);
        }

        .box::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.25), transparent);
            pointer-events: none;
        }

        .yellow {
            background: linear-gradient(145deg, #ffd84d, #ffb300);
        }

        .skyblue {
            background: linear-gradient(145deg, #77d8ff, #3eaedb);
        }

        .oceanblue {
            background: linear-gradient(145deg, #6b8cff, #3e5bff);
        }

        .purple {
            background: linear-gradient(145deg, #c34dff, #8f0177);
        }

        .flash {
            background: #ffffff !important;
            box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.35);
            transform: scale(1.04);
        }

        .userFlash {
            background: #2fe942 !important;
            box-shadow: 0 0 20px rgba(47, 233, 66, 0.45);
            transform: scale(1.04);
        }

        @media (max-width: 700px) {
            body {
                padding: 16px;
            }

            .game-shell {
                padding: 22px 16px;
            }

            .container {
                gap: 16px;
            }

            .box {
                border-radius: 18px;
            }
        }

        @media (max-width: 480px) {
            .game-shell {
                width: 100%;
            }

            .container {
                grid-template-columns: repeat(2, minmax(100px, 1fr));
                gap: 12px;
            }

            .box {
                min-height: 110px;
            }
        }
    </style>
</head>
<body>
    <div class="game-shell">
        <h1>Simon Says Game</h1>
        <h2>Press any key to start the game</h2>
        <div class="container">
            <div class="box yellow" type="button" id="yellow">1</div>
            <div class="box skyblue" type="button" id="skyblue">2</div>
            <div class="box oceanblue" type="button" id="oceanblue">3</div>
            <div class="box purple" type="button" id="purple">4</div>
        </div>
    </div>
    <script src="SimonGame.js"></script>
</body>
</html>
