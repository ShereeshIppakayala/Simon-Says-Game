<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="currency.css">
</head>

<body>
    <div class="main">
        <div class="container">
            <div class="header">
                <p class="eyebrow">Live exchange rates • Free API</p>
                <h1>Currency Converter</h1>
                <p class="subtext">Convert money instantly with a modern, reliable live-rate experience.</p>
            </div>

            <div class="amount">
                <label for="amount">Amount</label>
                <input id="amount" type="number" class="Eamt" value="1" min="1" step="any" placeholder="Enter amount">
            </div>

            <div class="dropdown">
                <div class="from">
                    <p>From</p>
                    <div class="SelectContainer">
                        <img src="https://flagcdn.com/w80/us.png" alt="US flag" />
                        <select name="from"></select>
                    </div>
                </div>

                <div class="swap-icon" aria-hidden="true">
                    <i class="fa-solid fa-arrow-right-arrow-left"></i>
                </div>

                <div class="to">
                    <p>To</p>
                    <div class="SelectContainer">
                        <img src="https://flagcdn.com/w80/in.png" alt="IN flag" />
                        <select name="to"></select>
                    </div>
                </div>
            </div>

            <div class="msg">Loading latest rates...</div>
            <button class="Ex-btn">Convert Now</button>
        </div>
    </div>

    <script src="currency.js"></script>
</body>

</html>
